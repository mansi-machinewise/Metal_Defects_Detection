# =============================================================================
# Industrial Metal Defect Detection System — Central Configuration
# =============================================================================

project:
  name: "MetalDefectDetection"
  version: "1.0.0"
  description: "Industrial metal surface defect detection using YOLOv8"

# -----------------------------------------------------------------------------
# Dataset
# -----------------------------------------------------------------------------
dataset:
  root: "dataset_merged"
  yaml: "dataset_merged/data.yaml"

  splits:
    train: "train/images"
    val:   "valid/images"
    test:  "test/images"

  min_samples:
    train: 50
    val:   10
    test:  5

  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tiff", ".webp"]

# -----------------------------------------------------------------------------
# Classes
# -----------------------------------------------------------------------------
classes:
  names:
    - defect

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  training:
  model: "yolov8s.pt"       # Small — good accuracy/speed balance
  epochs: 150
  batch_size: 8             # Admin PC has 102GB RAM — can handle larger batch
  image_size: 640
  workers: 4                # More workers = faster data loading
  amp: false                # CPU — disable AMP
  cache: false
  patience: 30
  save_period: 10
  exist_ok: true
  run_name: "defect_v3"

  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3      # Longer warmup = more stable training start

  # Loss weights — increase box loss for better localization
  box: 7.5                  # Default
  cls: 2.0                  # Increase from 0.5 — single class needs more weight
  dfl: 1.5                  # Default
  single_cls: true

  augmentation:
    hsv_h: 0.010      # Minimal hue shift (metal is mostly grey/silver)
    hsv_s: 0.5        # Moderate saturation (rust color variation)
    hsv_v: 0.4        # Brightness variation (lighting changes)
    degrees: 10        # Small rotation (camera is mostly fixed)
    translate: 0.1     # Small translation
    scale: 0.5         # Scale variation (distance from camera)
    flipud: 0.5        # Vertical flip (metal can be upside down)
    fliplr: 0.5        # Horizontal flip
    mosaic: 1.0        # Keep mosaic — great for small defects
    mixup: 0.0         # Disable mixup for metal inspection
    copy_paste: 0.0    # Disable — can create impossible defect patterns
    erasing: 0.2       # Light cutout/erasing

  project: "outputs/runs"

# -----------------------------------------------------------------------------
# Inference
# -----------------------------------------------------------------------------
inference:
  model_path: "outputs/runs/defect_v3/weights/best.pt"
  confidence_threshold: 0.20
  iou_threshold: 0.45
  max_detections: 50
  bad_threshold: 0.20
  max_allowed_defects: 0
  image_size: 640
  device: "auto"

# -----------------------------------------------------------------------------
# Camera
# -----------------------------------------------------------------------------
camera:
  source: 0
  width: 1280
  height: 720
  fps_target: 30
  buffer_size: 1
  reconnect_delay_sec: 2.0
  max_reconnect_attempts: 5
  inference_every_n_frames: 1
  window_name: "Metal Defect Detection — Live Feed"
  display_width: 960
  quit_key: "q"
  save_key: "s"

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  output_dir: "outputs/reports"
  predictions_dir: "outputs/predictions"
  generate_confusion_matrix: true
  generate_pr_curve: true
  max_vis_samples: 20

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  log_dir: "outputs/logs"
  log_file: "metal_defect.log"