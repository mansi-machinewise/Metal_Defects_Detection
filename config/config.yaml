# =============================================================================
# Industrial Metal Defect Detection System — Central Configuration
# =============================================================================

project:
  name: "MetalDefectDetection"
  version: "1.0.0"
  description: "Industrial metal surface defect detection using YOLOv8"

# -----------------------------------------------------------------------------
# Dataset
# -----------------------------------------------------------------------------
dataset:
  root: "dataset_merged"
  yaml: "dataset_merged/data.yaml"

  splits:
    train: "train/images"
    val:   "valid/images"
    test:  "test/images"

  min_samples:
    train: 50
    val:   10
    test:  5

  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tiff", ".webp"]

# -----------------------------------------------------------------------------
# Classes
# -----------------------------------------------------------------------------
classes:
  names:
    - defect

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  model: "yolov8s.pt"
  epochs: 150
  batch_size: 4
  image_size: 640
  workers: 2
  amp: false
  cache: false
  patience: 30
  save_period: 10
  exist_ok: false
  run_name: "defect_detection_v2"

  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3

  augmentation:
    hsv_h: 0.015
    hsv_s: 0.8
    hsv_v: 0.5
    degrees: 15
    translate: 0.1
    scale: 0.6
    flipud: 0.3
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.1

  project: "outputs/runs"

# -----------------------------------------------------------------------------
# Inference
# -----------------------------------------------------------------------------
inference:
  model_path: "outputs/runs/defect_detection_v2/weights/best.pt"
  confidence_threshold: 0.35
  iou_threshold: 0.45
  max_detections: 50
  bad_threshold: 0.35
  max_allowed_defects: 0
  image_size: 640
  device: "auto"

# -----------------------------------------------------------------------------
# Camera
# -----------------------------------------------------------------------------
camera:
  source: 0
  width: 1280
  height: 720
  fps_target: 30
  buffer_size: 1
  reconnect_delay_sec: 2.0
  max_reconnect_attempts: 5
  inference_every_n_frames: 1
  window_name: "Metal Defect Detection — Live Feed"
  display_width: 960
  quit_key: "q"
  save_key: "s"

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  output_dir: "outputs/reports"
  predictions_dir: "outputs/predictions"
  generate_confusion_matrix: true
  generate_pr_curve: true
  max_vis_samples: 20

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  log_dir: "outputs/logs"
  log_file: "metal_defect.log"