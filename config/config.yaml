camera:
  buffer_size: 1
  display_width: 960
  fps_target: 30
  height: 720
  inference_every_n_frames: 1
  max_reconnect_attempts: 5
  quit_key: q
  reconnect_delay_sec: 2.0
  save_key: s
  source: 0
  width: 1280
  window_name: "Metal Defect Detection \xE2\u20AC\u201D Live Feed"
classes:
  names:
  - defect
dataset:
  image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
  - .tiff
  - .webp
  min_samples:
    test: 5
    train: 50
    val: 10
  root: dataset_multiclass
  splits:
    test: test/images
    train: train/images
    val: valid/images
  yaml: dataset_multiclass/data.yaml
evaluation:
  generate_confusion_matrix: true
  generate_pr_curve: true
  max_vis_samples: 20
  output_dir: outputs/reports
  predictions_dir: outputs/predictions
inference:
  bad_threshold: 0.2
  confidence_threshold: 0.2
  device: auto
  image_size: 640
  iou_threshold: 0.45
  max_allowed_defects: 0
  max_detections: 50
  model_path: outputs/runs/NEU_Metal_yolo11m_AdamW_v2/weights/best.pt
logging:
  date_format: '%Y-%m-%d %H:%M:%S'
  format: '%(asctime)s | %(levelname)-8s | %(name)s | %(message)s'
  level: INFO
  log_dir: outputs/logs
  log_file: metal_defect.log
project:
  description: Industrial metal surface defect detection using YOLOv8
  name: MetalDefectDetection
  version: 1.0.0
training:
  amp: false
  augmentation:
    hsv_h: 0.01
    hsv_s: 0.5
    hsv_v: 0.4
    degrees: 10
    translate: 0.1
    scale: 0.5
    flipud: 0.3
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.0
    copy_paste: 0.0
    erasing: 0.1
  batch_size: 8
  box: 7.5
  cache: false
  cls: 2.0
  dfl: 1.5
  epochs: 150
  exist_ok: true
  image_size: 640
  lr0: 0.001
  lrf: 0.1
  model: yolo11m.pt
  momentum: 0.937
  optimizer: AdamW
  patience: 50
  project: outputs/runs
  run_name: NEU_Metal_yolo11m_AdamW_v2
  save_period: 10
  single_cls: false
  training: null
  warmup_epochs: 3
  weight_decay: 0.0005
  workers: 4
  cos_lr: true
  box: 7.5
  cls: 2.0
  dfl: 1.5
  